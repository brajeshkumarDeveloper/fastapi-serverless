name: Deploy FastAPI Serverless to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_ARN: ${{ secrets.ROLE_ARN }}
  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      # 3️⃣ Install Dependencies & Create Lambda Package
      - name: Build Lambda Package
        run: |
          cd app
          pip install -r requirements.txt -t .
          zip -r ../terraform/lambda.zip .

      # 4️⃣ Configure AWS Credentials via OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 5️⃣ Verify Identity (Debug Safety Step)
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 6️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 7️⃣ Terraform Init
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # 8️⃣ Terraform Validate
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # 9️⃣ Terraform Plan
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      # 🔟 Terraform Apply
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

  destroy-on-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform init
          terraform destroy -auto-approve